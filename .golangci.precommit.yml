version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - goconst
    - gocritic
    - funlen
    - goprintffuncname
    - gosec
    - gocognit
    - ineffassign
    - makezero
    - maintidx
    - misspell
    - nakedret
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - testifylint
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    funlen:
      lines: 100
      statements: 60
    gocognit:
      min-complexity: 120
    maintidx:
      under: 40
    nestif:
      min-complexity: 25
    staticcheck:
      checks:
        - all
        - "-ST1001"
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
    unparam:
      check-exported: true
  exclusions:
    generated: strict
    paths:
      - design/*
      - diagram/*
      - gql/*
      - mocks/*
      - codegen/agent/tests/testscenarios/*
    rules:
      - path: _test\.go
        linters:
          - dupl
      - path: _test\.go
        linters:
          - funlen
          - gocognit
          - maintidx
          - nestif
      - path: ^codegen/
        linters:
          - funlen
          - gocognit
          - maintidx
          - nestif
      - path: ^codegen/agent/tests/
        linters:
          - funlen
          - gocognit
          - maintidx
          - nestif
      - path: ^integration_tests/
        linters:
          - funlen
          - gocognit
          - maintidx
          - nestif
